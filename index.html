<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#FFF8F0">
<title>排排</title>
<style>
:root{--bg:#FBF9F4;--card:#FEFDF9;--text:#4A3728;--t2:#8B8680;--orange:#FEBA40;--gold:#FFD070;--brown:#A0522D;--accent:#F39C12;--red:#E85D5D;--blue:#BBD29F;--purple:#B8A0D0;--dq-bg:#FFF7E2;--cell-rec-bg:#FFF5E0;--tab-bg:#EDE5DC;--tint:#FFF0E5;--radius:24px;--radius-sm:16px;--card-shadow:0 8px 24px rgba(74,55,40,.08);--btn-shadow:0 6px 20px rgba(254,186,64,.2);--safe-bot:env(safe-area-inset-bottom,16px);--font:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:var(--font);color:var(--text);-webkit-tap-highlight-color:transparent;touch-action:manipulation;user-select:none;-webkit-user-select:none}
body{display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative}
.appbar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--card);border-bottom:1px solid rgba(0,0,0,.04);box-shadow:0 2px 8px rgba(0,0,0,.03)}
.appbar h1{font-size:22px;font-weight:900}
.streak-badge{display:flex;align-items:center;gap:4px;padding:8px 14px;border-radius:24px;font-weight:900;font-size:15px;transition:all .3s}
.streak-badge.lit{background:var(--tint);color:var(--orange);box-shadow:0 2px 8px rgba(255,154,61,.18)}
.streak-badge.cold{background:var(--tab-bg);color:var(--t2)}
.pages{flex:1;overflow:hidden;position:relative}
.page{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;display:none;padding-bottom:16px;animation:fi .2s ease-out}
.page.active{display:flex;flex-direction:column}
.bottom-nav{display:flex;background:var(--card);box-shadow:0 -2px 8px rgba(0,0,0,.05);padding-bottom:var(--safe-bot);position:relative}
.bottom-nav button{flex:1;padding:10px 0 6px;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;font-size:10px;font-weight:700;color:var(--t2);transition:all .2s cubic-bezier(.34,1.56,.64,1);position:relative}
.bottom-nav button.active{color:var(--orange);transform:scale(1.06)}
.bottom-nav button .ni{display:flex;align-items:center;justify-content:center;width:24px;height:24px;transition:all .2s}
.bottom-nav button .ni svg{width:24px;height:24px;display:block}
.bottom-nav button .dot{width:5px;height:5px;border-radius:50%;background:var(--orange);margin-top:1px;opacity:0;transition:opacity .2s}
.bottom-nav button.active .dot{opacity:1}
.month-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:8px 16px 6px}
.stat-card{background:var(--card);border-radius:var(--radius-sm);padding:12px 8px;text-align:center;box-shadow:var(--card-shadow)}
.stat-card .val{font-size:26px;font-weight:900;color:var(--orange)}
.stat-card .val.orange{color:var(--orange)}
.stat-card .lbl{font-size:11px;color:var(--t2);margin-top:2px}
.month-nav-cal{display:flex;align-items:center;justify-content:space-between;padding:4px 16px 8px}
.month-nav-cal span{font-size:17px;font-weight:800}
.month-nav-cal button{width:38px;height:38px;border-radius:50%;border:2px solid var(--tab-bg);background:var(--card);font-size:16px;cursor:pointer;box-shadow:var(--card-shadow);transition:transform .12s}
.month-nav-cal button:active{transform:scale(.92)}
.cal-card{background:var(--card);border-radius:20px;margin:0 16px;padding:8px 4px 0;box-shadow:var(--card-shadow);overflow:hidden;position:relative;flex-shrink:0}
.rec-today-btn{display:block;width:calc(100% - 24px);margin:8px 12px 12px;padding:12px;border:none;border-radius:var(--radius-sm);background:var(--orange);color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--font);transition:transform .12s}
.rec-today-btn:active{transform:scale(.97)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;padding:0 12px}
.cal-grid .dhead{font-size:11px;font-weight:700;color:var(--orange);text-align:center;padding:4px 0}
.cal-grid .dhead.we{color:var(--red)}
.cal-grid .cell{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:0;cursor:pointer;transition:all .2s cubic-bezier(.34,1.56,.64,1);position:relative;border:2px solid transparent;background:transparent}
.cal-grid .cell:active{transform:scale(.88)}
.cal-grid .cell.today{background:var(--orange);border-radius:var(--radius-sm);border:2px solid var(--orange)}
.cal-grid .cell.other{opacity:.25}
.cal-grid .cell.has-rec{border:2px solid var(--orange);border-radius:var(--radius-sm);background:var(--cell-rec-bg)}
.cal-grid .cell.today.has-rec{background:var(--orange)}
.cal-grid .cell .dnum{font-size:14px;font-weight:700;color:var(--text)}
.cal-grid .cell.today .dnum{color:#f0ece6}
.cal-grid .cell .dicon{font-size:16px;line-height:1}
.recent-list{padding:0 16px;display:flex;flex-direction:column;gap:6px;margin-top:12px}
.recent-header{display:flex;justify-content:space-between;align-items:center;padding:0 4px;margin-bottom:2px}
.recent-header h3{font-size:15px;font-weight:800}
.recent-header .all-link{font-size:12px;color:var(--t2);cursor:pointer;background:none;border:none;font-family:var(--font);font-weight:600}
.recent-item{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--card);border-radius:var(--radius-sm);cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.03)}
.flow-progress{padding:0 16px 8px;display:flex;gap:6px;align-items:center}
.flow-bar{flex:1;height:10px;background:var(--tab-bg);border-radius:5px;overflow:hidden}
.flow-bar-inner{height:100%;background:var(--orange);border-radius:5px;transition:width .3s}
.flow-count{font-size:13px;font-weight:700;color:var(--t2);white-space:nowrap}
.flow-title{font-size:24px;font-weight:900;padding:4px 16px 2px}
.flow-sub{font-size:13px;color:var(--t2);padding:0 16px 16px}
.flow-options{flex:1;overflow-y:auto;padding:0 16px 16px;display:flex;flex-direction:column;gap:8px}
.opt-card{display:flex;align-items:center;gap:14px;padding:18px;background:var(--card);border-radius:var(--radius);border:2.5px solid transparent;cursor:pointer;transition:all .2s cubic-bezier(.34,1.56,.64,1);box-shadow:var(--btn-shadow)}
.opt-card:active{transform:scale(.96);box-shadow:0 2px 6px rgba(0,0,0,.06)}
.opt-card.picked{border-color:var(--orange);background:var(--cell-rec-bg);box-shadow:0 6px 18px rgba(255,154,61,.18);transform:scale(1.02)}
.opt-card .o-emoji{font-size:36px;flex-shrink:0;width:48px;text-align:center}
.opt-card .o-text{flex:1}
.opt-card .o-label{font-size:17px;font-weight:700}
.opt-card .o-sub{font-size:12px;color:var(--t2)}
.opt-card .o-check{color:var(--orange);font-size:24px;display:none}
.opt-card.picked .o-check{display:block}
.confetti-container{position:fixed;inset:0;pointer-events:none;z-index:999}
.confetti-piece{position:absolute;width:10px;height:10px;border-radius:3px;animation:cf 2s ease-out forwards}
@keyframes cf{0%{transform:translateY(-100px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
.streak-hero{display:flex;flex-direction:column;align-items:center;padding:20px 0 8px}
.streak-hero .sh-icon{font-size:40px}
.streak-hero .sh-num{font-size:52px;font-weight:900;color:var(--orange);margin-top:2px}
.streak-hero .sh-msg{font-size:14px;font-weight:700;color:var(--t2);margin-top:2px}
.ach-stats-bar{display:flex;justify-content:space-between;align-items:center;padding:4px 20px 0;font-size:13px;font-weight:700;color:var(--t2)}
.ach-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:0 16px}
.ach-card{background:var(--card);border-radius:var(--radius);padding:14px 10px;display:flex;flex-direction:column;align-items:center;gap:4px;box-shadow:0 1px 3px rgba(0,0,0,.03);transition:all .25s cubic-bezier(.34,1.56,.64,1)}
.ach-card.unlocked{box-shadow:0 3px 10px rgba(88,204,2,.06)}
.ach-card.locked{opacity:.38;filter:grayscale(1)}
.ach-card .ac-icon{font-size:32px;line-height:1}
.ach-card .ac-title{font-size:13px;font-weight:800;color:var(--text)}
.ach-card .ac-desc{font-size:10px;color:var(--t2);text-align:center;line-height:1.3}
.bar-pct{font-size:9px;color:var(--t2);font-weight:600;margin-top:1px}
.trend-days{display:flex;gap:6px;justify-content:space-between}
.td-item{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;min-width:0}
.td-dot-wrap{display:flex;flex-wrap:wrap;justify-content:center;gap:2px;min-height:30px;align-items:center}
.td-dot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;line-height:1;flex-shrink:0}
.td-empty-dot{width:24px;height:24px;border-radius:50%;border:2px dashed var(--tab-bg);flex-shrink:0}
.td-label{font-size:11px;color:var(--t2);font-weight:600}
.td-day{font-size:13px;font-weight:700;color:var(--text)}
.mood-ring{width:130px;height:130px;border-radius:50%;flex-shrink:0}
.mood-inner{width:64px;height:64px;border-radius:50%;background:var(--bg);position:relative;top:50%;left:50%;transform:translate(-50%,-50%);display:flex;align-items:center;justify-content:center}
.chart-card{background:var(--card);border-radius:var(--radius);padding:18px;margin:8px 16px;box-shadow:var(--card-shadow)}
.chart-card h3{font-size:15px;font-weight:800;margin-bottom:14px;color:var(--text)}
.bar-row{display:flex;align-items:flex-end;gap:6px;height:100px;padding-top:16px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar-fill{border-radius:6px 6px 0 0;width:100%;min-height:2px;transition:height .4s}
.bar-label{font-size:10px;color:var(--t2);font-weight:600}
.set-section{padding:12px 16px;display:flex;flex-direction:column;gap:10px}
.set-card{display:flex;align-items:center;gap:14px;padding:18px;background:var(--card);border-radius:var(--radius);border:none;width:100%;cursor:pointer;text-align:left;font:inherit;box-shadow:0 1px 3px rgba(0,0,0,.03);transition:transform .12s}
.set-card:active{transform:scale(.98)}
.set-card .sc-icon{font-size:28px;flex-shrink:0;color:var(--orange);width:28px;height:28px;display:flex;align-items:center;justify-content:center}
.set-card .sc-text{flex:1}
.set-card .sc-title{font-size:16px;font-weight:700}
.set-card .sc-sub{font-size:11px;color:var(--t2)}
.avatar-card{display:flex;align-items:center;gap:14px;padding:20px;background:var(--card);border-radius:var(--radius);box-shadow:0 1px 3px rgba(0,0,0,.03)}
.avatar-ring{width:64px;height:64px;border-radius:50%;background:var(--tint);display:flex;align-items:center;justify-content:center;font-size:40px;flex-shrink:0}
.avatar-edit-icon{width:18px;height:18px;color:var(--t2);flex-shrink:0;cursor:pointer;transition:color .15s}
.avatar-edit-icon:active{color:var(--orange)}
.danger-btn{width:100%;padding:16px;border-radius:var(--radius);border:2px solid var(--red);background:transparent;color:var(--red);font-size:15px;font-weight:700;cursor:pointer;transition:transform .12s}
.danger-btn:active{transform:scale(.97)}
.d-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:center;justify-content:center;animation:fi .2s}
@keyframes fi{from{opacity:0}to{opacity:1}}
.dialog{background:var(--card);border-radius:var(--radius);padding:24px;width:calc(100% - 48px);max-width:360px;text-align:center}
.dialog h2{font-weight:900;font-size:18px;margin-bottom:8px}
.dialog p{font-size:13px;color:var(--t2);margin-bottom:18px}
.dialog .d-btns{display:flex;gap:8px}
.dialog .d-btns button{flex:1;padding:14px;border-radius:var(--radius-sm);border:none;font-size:14px;font-weight:700;cursor:pointer}
.toast{position:fixed;bottom:120px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:10px 22px;border-radius:99px;font-size:13px;font-weight:600;z-index:250;animation:ti .25s;pointer-events:none;white-space:nowrap}
@keyframes ti{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
/* Day record sheet (existing) */
.sh-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:110;display:flex;align-items:flex-end;animation:fi .2s}
.sh-overlay.closing{animation:fo .2s forwards}
@keyframes fo{from{opacity:1}to{opacity:0}}
.sh-sheet{background:var(--card);border-radius:24px 24px 0 0;width:100%;max-width:480px;margin:0 auto;padding:24px 20px 32px;max-height:70vh;overflow-y:auto;animation:shIn .25s cubic-bezier(.22,.61,.36,1)}
.sh-overlay.closing .sh-sheet{animation:shOut .2s ease-in forwards}
@keyframes shIn{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes shOut{from{transform:translateY(0)}to{transform:translateY(100%)}}
.sh-sheet h3{font-weight:900;font-size:18px;margin-bottom:12px}
.sh-entry{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid rgba(0,0,0,.04)}
.sh-add-btn{width:100%;padding:14px;background:var(--orange);color:#fff;border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:700;cursor:pointer;margin-top:12px}
/* Celebration overlay */
.cel-overlay{position:fixed;inset:0;background:var(--card);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;animation:fi .25s}
.cel-overlay.closing{animation:fo .3s forwards}
.cel-poop{font-size:96px;animation:celBounce .6s cubic-bezier(.34,1.56,.64,1)}
@keyframes celBounce{0%{transform:scale(0) rotate(-20deg)}60%{transform:scale(1.2) rotate(5deg)}100%{transform:scale(1) rotate(0)}}
.cel-check{font-size:32px;font-weight:900;margin-top:16px;animation:celFadeUp .4s .2s both}
.cel-sub{font-size:15px;color:var(--t2);margin-top:6px;animation:celFadeUp .4s .5s both}
.cel-streak{font-size:20px;font-weight:900;color:var(--orange);margin-top:12px;animation:celFadeUp .4s .7s both}
.cel-comment{font-size:15px;font-weight:600;color:var(--text);margin-top:14px;max-width:280px;text-align:center;line-height:1.5;animation:celFadeUp .4s 1s both}
@keyframes celFadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.daily-quote{margin:4px 16px 8px;padding:8px 12px;background:var(--dq-bg);border-radius:var(--radius-sm);box-shadow:0 2px 8px rgba(0,0,0,.06);animation:dqBounce .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes dqBounce{0%{opacity:0;transform:translateY(-12px) scale(.9)}100%{opacity:1;transform:translateY(0) scale(1)}}
.daily-quote .dq-head{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.daily-quote .dq-bulb{font-size:18px;color:var(--orange)}
.daily-quote .dq-tag{font-size:11px;font-weight:800;color:var(--orange)}
.daily-quote .dq-text{font-size:13px;color:var(--text);line-height:1.5;font-weight:600}
.daily-quote .dq-foot{display:flex;justify-content:flex-end;margin-top:4px}
.daily-quote .dq-refresh{font-size:11px;color:var(--t2);cursor:pointer;background:none;border:none;font-family:var(--font)}
.stats-tabs{display:flex;gap:4px;margin:0 16px 8px;padding:3px;background:var(--tab-bg);border-radius:12px}
.stats-tab{flex:1;padding:8px;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;background:transparent;color:var(--t2);transition:all .2s cubic-bezier(.34,1.56,.64,1);font-family:var(--font)}
.stats-tab .ti{display:flex;align-items:center;width:18px;height:18px}
.stats-tab .ti svg{width:18px;height:18px;display:block}
.stats-tab.active{background:var(--card);color:var(--orange);box-shadow:0 2px 6px rgba(0,0,0,.08)}
.stats-sub{display:none;flex-direction:column}
.stats-sub.active{display:flex}
.ana-placeholder{text-align:center;padding:40px 20px;color:var(--t2)}
.ana-placeholder .ap-icon{font-size:48px;margin-bottom:12px}
.ana-placeholder .ap-msg{font-size:14px;font-weight:600;line-height:1.5}
.ana-score-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:0 16px 4px}
.ana-score-card{background:var(--card);border-radius:var(--radius-sm);padding:14px 10px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.03)}
.ana-score-card .as-val{font-size:24px;font-weight:900}
.ana-score-card .as-lbl{font-size:11px;color:var(--t2);margin-top:2px}
.ana-tip{background:linear-gradient(135deg,var(--tint),var(--cell-rec-bg));border-radius:var(--radius-sm);padding:14px 16px;margin:8px 16px 4px;font-size:13px;color:var(--text);line-height:1.6;font-weight:600}
.ach-popup{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:flex;align-items:center;justify-content:center;animation:fi .2s}
.ach-popup.closing{animation:fo .2s forwards}
.ach-popup-card{background:var(--card);border-radius:var(--radius);padding:28px 24px 20px;width:calc(100% - 48px);max-width:340px;display:flex;flex-direction:column;align-items:center;text-align:center;animation:shIn .25s cubic-bezier(.22,.61,.36,1)}
.ach-popup .ap-icon{font-size:64px;margin-bottom:8px}
.ach-popup .ap-title{font-size:22px;font-weight:900;margin-bottom:4px}
.ach-popup .ap-desc{font-size:13px;color:var(--t2);margin-bottom:12px;line-height:1.4}
.ach-popup .ap-bar-wrap{width:100%;margin:8px 0 6px}
.ach-popup .ap-bar{height:8px;background:var(--tab-bg);border-radius:4px;overflow:hidden}
.ach-popup .ap-bar-inner{height:100%;border-radius:4px;transition:width .3s}
.ach-popup .ap-prog-text{font-size:12px;color:var(--t2);margin-top:4px;font-weight:600}
.ach-popup .ap-status{font-size:14px;font-weight:700;margin-top:8px}
.ach-popup .ap-btn{width:100%;padding:14px;border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:700;cursor:pointer;margin-top:12px;font-family:var(--font)}
.theme-row{display:flex;gap:12px;padding:16px 18px;align-items:center;background:var(--card);border-radius:var(--radius);box-shadow:0 1px 3px rgba(0,0,0,.03)}
.theme-row span{font-size:14px;font-weight:700;color:var(--text);flex-shrink:0}
.theme-dot{width:32px;height:32px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:all .2s cubic-bezier(.34,1.56,.64,1)}
.theme-dot.active{border-color:var(--orange);transform:scale(1.12)}
.ach-badges{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.ach-badges .badge-dot{font-size:18px;display:flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;background:var(--tint);line-height:1}
.emoji-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;padding:4px 0}
.emoji-grid button{width:100%;aspect-ratio:1;font-size:32px;border:none;border-radius:var(--radius-sm);background:var(--card);cursor:pointer;transition:all .15s;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.emoji-grid button:active{transform:scale(.9);background:var(--cell-rec-bg)}
.emoji-grid button.selected{box-shadow:0 0 0 3px var(--orange);background:var(--cell-rec-bg)}

/* Flow bottom sheet */
.flow-bd{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:flex-end;animation:fi .2s}
.flow-bd.closing{animation:fo .2s forwards}
.flow-bd.closing .flow-sh{animation:flOut .25s ease-in forwards}
.flow-sh{width:100%;max-width:480px;height:88vh;background:var(--bg);border-radius:24px 24px 0 0;display:flex;flex-direction:column;overflow:hidden;animation:flIn .35s cubic-bezier(.22,.61,.36,1)}
@keyframes flIn{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes flOut{from{transform:translateY(0)}to{transform:translateY(100%)}}
.flow-sh-hd{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;flex-shrink:0}
.flow-sh-hd button{background:none;border:none;font-size:15px;cursor:pointer;padding:8px;font-weight:600}
.flow-sh-bd{flex:1;display:flex;flex-direction:column;overflow-y:auto;transition:opacity .18s,transform .18s}
/* Two-column Bristol+Color */
.bc-row{display:flex;gap:10px;padding:0 4px}
.bc-l{flex:1.15;display:flex;flex-direction:column;gap:7px}
.bc-r{flex:1;display:flex;flex-direction:column;gap:7px;margin-top:56px}
.bc-l .bc-card,.bc-r .bc-card{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--card);border-radius:var(--radius);border:2.5px solid transparent;cursor:pointer;transition:all .2s cubic-bezier(.34,1.56,.64,1);box-shadow:var(--card-shadow)}

const DB={_db:null,
  async open(){return new Promise((r,j)=>{const q=indexedDB.open('shitDiary',1);q.onupgradeneeded=e=>{if(!e.target.result.objectStoreNames.contains('rec')){const s=e.target.result.createObjectStore('rec',{keyPath:'id'});s.createIndex('date','date')}};q.onsuccess=e=>{this._db=e.target.result;r()};q.onerror=j})},

const AUD={ctx:null,
  ensure(){if(!this.ctx){this.ctx=new(window.AudioContext||window.webkitAudioContext)()}if(this.ctx.state==='suspended')this.ctx.resume();return this.ctx},
  // Tap feedback
  tap(){const c=this.ensure();const o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=880;g.gain.setValueAtTime(.1,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.06);o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+.06)},
  // Celebration — arpeggio run + reveal chord
  celebrate(){const c=this.ensure(),t=c.currentTime;const run=[392,440,523,587,659,784];run.forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(.1,t+i*.05);g.gain.exponentialRampToValueAtTime(.001,t+i*.05+.18);o.connect(g);g.connect(c.destination);o.start(t+i*.05);o.stop(t+i*.05+.18)});const chord=[392,494,587,784];chord.forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.type='triangle';o.frequency.value=f;g.gain.setValueAtTime(.14,t+.35);g.gain.exponentialRampToValueAtTime(.001,t+.35+.8);o.connect(g);g.connect(c.destination);o.start(t+.35);o.stop(t+.35+.8)})},

  achieve(){const c=this.ensure(),t=c.currentTime;const b=c.createBuffer(1,c.sampleRate*.08,c.sampleRate);const d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.max(0,1-i/d.length*.9);const ns=c.createBufferSource(),ng=c.createGain();ns.buffer=b;ng.gain.setValueAtTime(.22,t);ng.gain.exponentialRampToValueAtTime(.001,t+.08);ns.connect(ng);ng.connect(c.destination);ns.start();const lo=c.createOscillator(),lg=c.createGain();lo.type='sine';lo.frequency.setValueAtTime(120,t);lo.frequency.exponentialRampToValueAtTime(40,t+.08);lg.gain.setValueAtTime(.25,t);lg.gain.exponentialRampToValueAtTime(.001,t+.1);lo.connect(lg);lg.connect(c.destination);lo.start();lo.stop(t+.1);const shards=[1200,1050,900,780,660,580];shards.forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(.07,t+.1+i*.04);g.gain.exponentialRampToValueAtTime(.001,t+.1+i*.04+.15);o.connect(g);g.connect(c.destination);o.start(t+.1+i*.04);o.stop(t+.1+i*.04+.15)});const chord=[392,494,587,784];chord.forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.type='triangle';o.frequency.value=f;g.gain.setValueAtTime(.12,t+.38);g.gain.exponentialRampToValueAtTime(.001,t+.38+.6);o.connect(g);g.connect(c.destination);o.start(t+.38);o.stop(t+.38+.6)})},

function getMaxStreakEver(all){if(all.length===0)return 0;const dates=new Set(all.map(r=>r.date));const sorted=[...dates].sort();let max=0,cur=0;const prev=new Date();for(const ds of sorted){if(cur===0){cur=1;prev.setTime(new Date(ds).getTime());continue}const curD=new Date(ds);const diffDays=Math.round((curD-prev)/86400000);if(diffDays===1){cur++;max=Math.max(max,cur)}else{max=Math.max(max,cur);cur=1}prev.setTime(curD.getTime())}max=Math.max(max,cur);const saved=Math.max(max,JSON.parse(localStorage.getItem('shitDiary_maxStreak')||'0'));localStorage.setItem('shitDiary_maxStreak',JSON.stringify(saved));return saved}

function getDailyQuote(){
  const seen=JSON.parse(localStorage.getItem('shitDiary_seenQuotes')||'[]');
  const pool=DAILY_QUOTES.filter(q=>!seen.includes(q.text));
  if(pool.length===0){localStorage.setItem('shitDiary_seenQuotes','[]');return getDailyQuote()}
  const q=pool[Math.floor(Math.random()*pool.length)];
  seen.push(q.text);localStorage.setItem('shitDiary_seenQuotes',JSON.stringify(seen));
  return q;
}

function getTitle(ach){
  const order=['📜','🏆','👑','🗂️','💎','🏃','🌈','😄','💨','💪','🦉','🐦','⚡','🍌','🔥🔥','🧠','🌅','🔥'];

}

  const postAch=await getAch();

async function renderAnalysis(){
  const all=await DB.getAll(),t=all.length;
  const el=document.getElementById('analysisContent');
  if(t<5){el.innerHTML=`<div class="ana-placeholder"><div class="ap-icon">🔬</div><div class="ap-msg">再记录 ${5-t} 天即可解锁<br>身体状况分析</div></div>`;return;}
  const bt=[],sm={},mo={},tsl={};
  for(let i=1;i<=7;i++)bt[i]=0;
  all.forEach(r=>{bt[r.bt]=(bt[r.bt]||0)+1;sm[r.sm]=(sm[r.sm]||0)+1;mo[r.mood]=(mo[r.mood]||0)+1;tsl[r.tslot]=(tsl[r.tslot]||0)+1});
  const bristolScore=Math.round(((bt[3]||0)+(bt[4]||0))/t*100);
  const comfortScore=Math.round(((sm['verySmooth']||0)+(sm['smooth']||0))/t*100);
  const regularityScore=Math.round((tsl['晨起']||0)/Math.max(t,1)*100);
  const moodScore=Math.round((mo['great']||0)/Math.max(t,1)*100);
  const cc=cl=>cl>=80?'var(--orange)':cl>=50?'var(--orange)':'var(--red)';
  const tips=[];
  if((bt[1]||0)+(bt[2]||0)>t*.3)tips.push('Type 1-2 偏多，建议多吃蔬菜水果，每天保证 1.5-2L 饮水 🥗💧');
  if((bt[6]||0)+(bt[7]||0)>t*.3)tips.push('Type 6-7 偏多，肠胃较敏感，少吃辛辣生冷食物 🍲');
  if((sm['hard']||0)+(sm['impossible']||0)>t*.4)tips.push('排便困难次数较多，多喝水多吃纤维，可以试试喝一杯温水促进肠蠕动 🚰');
  if((tsl['凌晨']||0)+(tsl['睡前']||0)>t*.3)tips.push('作息偏晚，尽量规律时间有利于肠道健康 🌙');
  if(moodScore>=60)tips.push('心情总体很棒，愉快的心情也有助于肠道健康 😊');
  if(tips.length===0)tips.push('目前各项指标良好，保持现在的习惯就好 👌');
  // 7-day Bristol color blocks
  const days=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);const ds=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;days.push({ds,wd:['日','一','二','三','四','五','六'][d.getDay()],day:d.getDate()})}
  const trendBlocks=days.map(({ds,wd,day})=>{const rs=all.filter(r=>r.date===ds);if(!rs.length)return`<div class="td-item"><div class="td-dot-wrap"><div class="td-empty-dot"></div></div><span class="td-label">${wd}</span><span class="td-day">${day}</span></div>`;const dots=rs.map(r=>`<span class="td-dot" style="background:${BC[r.bt-1]}" title="${BN[r.bt-1]}">${BE[r.bt-1]}</span>`).join('');return`<div class="td-item"><div class="td-dot-wrap">${dots}</div><span class="td-label">${wd}</span><span class="td-day">${day}</span></div>`}).join('');
  // Weekly comparison
  const now=new Date();const weekAgo=new Date(now);weekAgo.setDate(now.getDate()-7);
  const thisWeek=all.filter(r=>r.date>=`${weekAgo.getFullYear()}-${String(weekAgo.getMonth()+1).padStart(2,'0')}-${String(weekAgo.getDate()).padStart(2,'0')}`);
  const lastWeek=all.filter(r=>r.date<`${weekAgo.getFullYear()}-${String(weekAgo.getMonth()+1).padStart(2,'0')}-${String(weekAgo.getDate()).padStart(2,'0')}`).slice(0,thisWeek.length||1);
  const twSmooth=Math.round(((thisWeek.filter(r=>r.sm==='verySmooth'||r.sm==='smooth').length)/Math.max(thisWeek.length,1))*100);
  const lwSmooth=lastWeek.length?Math.round(((lastWeek.filter(r=>r.sm==='verySmooth'||r.sm==='smooth').length)/Math.max(lastWeek.length,1))*100):0;
  el.innerHTML=
    `<div class="ana-score-row">`+
    `<div class="ana-score-card"><div class="as-val" style="color:${cc(bristolScore)}">${bristolScore}</div><div class="as-lbl">肠道健康</div></div>`+
    `<div class="ana-score-card"><div class="as-val" style="color:${cc(regularityScore)}">${regularityScore}</div><div class="as-lbl">规律度</div></div>`+
    `<div class="ana-score-card"><div class="as-val" style="color:${cc(comfortScore)}">${comfortScore}</div><div class="as-lbl">舒适度</div></div>`+
    `</div>`+
    `<div class="chart-card"><h3>近 7 天 布里斯托 分布</h3><div class="trend-days">${trendBlocks}</div></div>`+
    `<div class="chart-card"><h3>本周 vs 上周</h3><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;text-align:center"><div><div style="font-size:28px;font-weight:900;color:var(--orange)">${thisWeek.length}</div><div style="font-size:11px;color:var(--t2)">本周记录</div></div><div><div style="font-size:28px;font-weight:900;color:var(--t2)">${lastWeek.length}</div><div style="font-size:11px;color:var(--t2)">上周记录</div></div><div><div style="font-size:28px;font-weight:900;color:var(--orange)">${twSmooth}%</div><div style="font-size:11px;color:var(--t2)">本周顺畅度</div></div><div><div style="font-size:28px;font-weight:900;color:var(--t2)">${lwSmooth}%</div><div style="font-size:11px;color:var(--t2)">上周顺畅度</div></div></div></div>`+
    tips.map(t=>`<div class="ana-tip">${t}</div>`).join('');
}

function applyTheme(k){
  const t=THEMES[k];const r=document.documentElement.style;
  r.setProperty('--bg',t.bg);r.setProperty('--card',t.card);r.setProperty('--text',t.text);r.setProperty('--t2',t.t2);r.setProperty('--orange',t.orange);r.setProperty('--gold',t.gold);r.setProperty('--brown',t.brown);r.setProperty('--accent',t.accent);r.setProperty('--red',t.red);r.setProperty('--blue',t.blue);r.setProperty('--purple',t.purple);r.setProperty('--dq-bg',t.dqBg);r.setProperty('--cell-rec-bg',t.cellRecBg);r.setProperty('--tab-bg',t.tabBg);r.setProperty('--tint',t.tint);
  localStorage.setItem('shitDiary_theme',k);document.querySelectorAll('.theme-dot').forEach(d=>d.classList.toggle('active',d.dataset.theme===k));
}
document.querySelectorAll('.theme-dot').forEach(d=>{d.onclick=()=>applyTheme(d.dataset.theme)});
const savedTheme=localStorage.getItem('shitDiary_theme')||'warm';
applyTheme(savedTheme);

renderCal();updStreak();updUserCard();
document.querySelector('.appbar h1').addEventListener('click',()=>{
  easterEggClicks++;clearTimeout(easterEggTimer);
  if(easterEggClicks>=7){
    AUD.celebrate();spawnConfetti();
    const ov=document.createElement('div');ov.className='d-overlay';
    const BLS=['愿你的每一次都顺畅如意 🍌','厕所之神保佑你，天天好状态 ✨','祝你的肠道永远年轻有活力 💪','愿你与便便和谐共处，相安无事 🧘','拉得好，活得久，厕所之神与你同在 🚽','愿布里斯托第三型常伴你左右 🍌'];
    ov.innerHTML=`<div class="dialog"><h2>🚽👑 厕所之神</h2><p>你发现了隐藏的彩蛋！</p><p style="font-size:13px;color:var(--t2);margin-top:4px">${BLS[Math.floor(Math.random()*BLS.length)]}</p><button style="margin-top:14px;width:100%;padding:12px;border:none;border-radius:var(--radius-sm);background:var(--orange);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font)" id="ecClose">👑 接受祝福</button></div>`;
    ov.onclick=e=>{if(e.target===ov)ov.remove()};ov.querySelector('#ecClose').onclick=()=>ov.remove();document.body.appendChild(ov);
    easterEggClicks=0;
  }else if(easterEggClicks===5){toast('再点两次有惊喜… 💩')}
  else if(easterEggClicks===3){toast('干嘛一直点我？')}
  easterEggTimer=setTimeout(()=>{easterEggClicks=0},1200);
});
void function tryBoing(){try{AUD.boing()}catch{setTimeout(tryBoing,200)}}();
setTimeout(()=>{const s=document.getElementById('splash');s.classList.add('fade');setTimeout(()=>s.remove(),350)},1200);</script>
